---
- name: Generate random suffix for each cluster's namespace
  vars:
    suffix: "{{ 1000 | random | string | regex_replace('^[^a-z0-9]*([a-z0-9]+)', '\\1') }}"
  set_fact:
    namespace_name: "test-{{ suffix }}-{{ inventory_hostname | lower }}"

- name: Print kubeconfig path and namespace for debugging
  debug:
    msg: "Using kubeconfig: {{ kubeconfigs[inventory_hostname] }} to create namespace: {{ namespace_name }}"

- name: Create namespace for each cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfigs[inventory_hostname] }}"
    api_version: v1
    kind: Namespace
    state: present
    name: "{{ namespace_name }}"
  register: namespace_creation
  ignore_errors: no  # We want to see the error if it fails

- name: Debug namespace creation result
  debug:
    var: namespace_creation
  when: namespace_creation is failed

- name: Confirm namespace creation
  debug:
    msg: "Namespace {{ namespace_name }} created in cluster {{ inventory_hostname }}"
  when: namespace_creation is succeeded

- name: Collect namespace details in host-specific variable
  set_fact:
    host_namespace_data:
      cluster: "{{ inventory_hostname }}"
      namespace: "{{ namespace_name }}"
